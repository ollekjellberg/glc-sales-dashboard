name: Weekly Monday.com sync

on:
  schedule:
    # Currently DAILY at 06:00 UTC (10;00 Asia/Dubai) — you set this to daily
    # yourself to test the automation tomorrow morning. Once you've confirmed
    # it's firing reliably, change this back to weekly:
    #   - cron: '0 6 * * 1'   (Mondays only)
    # Deliberately NOT on the hour (03:00) — GitHub's own docs flag the start
    # of every hour as the highest-load window for scheduled workflows, where
    # runs are most likely to be delayed or, under heavy load, dropped.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the Actions tab

concurrency:
  group: weekly-sync
  cancel-in-progress: false   # let an in-progress run finish; queue the next one rather than race it

permissions:
  contents: write   # required so the workflow can push the commit it creates

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preserve prior snapshot for diffing
        run: cp snapshot.json /tmp/prev-snapshot.json 2>/dev/null || echo '{}' > /tmp/prev-snapshot.json

      - name: Run extraction
        run: node scripts/extract.js
        env:
          MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}

      - name: Commit changes if any
        id: commit
        run: |
          git config user.name "glc-sync-bot"
          git config user.email "actions@github.com"
          git add -- data.js snapshot.json
          [ -f unmapped-values.json ] && git add -- unmapped-values.json
          [ -f rejected-records.json ] && git add -- rejected-records.json
          if git diff --cached --quiet; then
            echo "No changes detected — nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Weekly sync: $(date -u +%Y-%m-%d)"
            if ! git push; then
              echo "Push rejected — remote moved since checkout. Rebasing and retrying once..."
              git pull --rebase origin main
              git push
            fi
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate weekly insights (Haiku + Opus)
        if: steps.commit.outputs.committed == 'true'
        run: node agents/generate-insights.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit commentary if any
        if: steps.commit.outputs.committed == 'true'
        run: |
          [ -f commentary.js ] && git add -- commentary.js
          [ -f CHANGELOG.md ] && git add -- CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No commentary changes to commit."
          else
            git commit -m "Weekly insights: $(date -u +%Y-%m-%d)"
            if ! git push; then
              echo "Push rejected — remote moved since checkout. Rebasing and retrying once..."
              git pull --rebase origin main
              git push
            fi
          fi

      - name: Build standalone dashboard for email
        if: steps.commit.outputs.committed == 'true'
        run: node scripts/build-standalone.js

      - name: Email dashboard
        if: steps.commit.outputs.committed == 'true'
        continue-on-error: true   # an email hiccup must never fail the data sync
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: ${{ secrets.MAIL_USERNAME }}
          to: ${{ secrets.MAIL_TO }}
          subject: "GLC Sales Dashboard — weekly update"
          body: |
            Hi,

            The GLC sales dashboard has been updated with this week's Monday.com data.

            The full dashboard is attached — just open the file in any browser.

            (This email is sent automatically by the weekly sync, only when the data has actually changed. It is currently sent from Charlie's Gmail, but can be sent through a GLC bot on outlook as soon as the admin password is provided.)
          attachments: GLC-Sales-Dashboard.html
